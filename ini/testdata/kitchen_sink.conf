# Kitchen sink — exercises every feature in the INI specification
#
# Global / default section parameters (before any [section] header)
global_key = root_value



# Blank lines and whitespace-only lines above should be ignored

# Include a sub-directory of .conf files (lexicographic order, skip dotfiles)
include_dir './kitchen_sink'

# Include a file with a non-.conf extension
include './kitchen_sink/more/extra.ini'

# Include a hidden dotfile
include './kitchen_sink/more/.hidden'

# Include that silently succeeds
include_if_exists './kitchen_sink/more/optional.conf'

# Include that silently fails (file does not exist)
include_if_exists './kitchen_sink/more/nonexistent.conf'
