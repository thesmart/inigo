# unquoted-value ::= safe-char+
# safe-char ::= letter | digit | [_.\-:/+]
# Tests all safe-char categories in unquoted values.

alpha = abcdef
upper = ABCDEF
digits = 1234567890
underscore = hello_world
dot = file.txt
dash = my-value
colon = host:port
slash = /usr/local/bin
plus = value+extra
mixed = abc123_DEF.foo-bar:8080/path+end
url_like = https://example.com:443/path
ip_addr = 192.168.1.1
version = v1.2.3-rc.1+build.42
path = /tmp/my_dir/file.conf
hex_like = 0xFF
negative = -123
signed = +456
float_like = 3.14
