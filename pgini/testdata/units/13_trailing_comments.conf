# Tests inline comments after values and section headers.

# after unquoted value
key1 = value # hash comment
key2 = value ; semicolon comment

# after quoted value
key3 = 'quoted' # hash after quoted
key4 = 'quoted' ; semi after quoted

# after empty value with separator
key5 = # comment makes value empty
key6 : ; comment makes value empty

# after section header (also tested in 03 but repeated for completeness)
[commented] # comment
key7 = value

# comment char inside quotes is literal, not a comment
key8 = 'has # inside'
key9 = 'has ; inside'
