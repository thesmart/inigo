# WSP ::= [#x20 #x09]
# Tests whitespace handling: spaces, tabs, mixed, around all elements.

# leading spaces before key
   spaced_key = value
# leading tab before key
	tabbed_key = value
# mixed leading whitespace
 	 mixed_key = value

# whitespace around separator
padded_eq   =   padded_value
padded_colon   :   padded_value_colon
tabs_eq	=	tabbed_value

# trailing whitespace after unquoted value
trailing_spaces = value
trailing_tabs = value

# trailing whitespace after quoted value
trailing_after_quote = 'quoted'

# section with internal whitespace
[  spaced_section  ]
inner = value
