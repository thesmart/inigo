# quoted-value ::= "'" (print-char | escape-seq)* "'"
# escape-seq ::= "\\" | "\'" | "''" | "\b" | "\f" | "\n" | "\r" | "\t" | octal-escape
# octal-escape ::= "\" octal-digit octal-digit? octal-digit?

# empty quoted string
empty = ''

# simple text
simple = 'hello world'

# spaces and tabs
spaced = '  leading and trailing  '

# backslash escapes
escaped_backslash = 'back\\slash'
escaped_single_quote = 'it\'s'
escaped_b = 'back\bspace'
escaped_f = 'form\ffeed'
escaped_n = 'new\nline'
escaped_r = 'carriage\rreturn'
escaped_t = 'tab\there'

# doubled quote (alternative single-quote escape)
doubled_quote = 'it''s doubled'

# octal escapes
octal_one = '\0'
octal_null = '\000'
octal_bell = '\007'
octal_tab = '\011'
octal_newline = '\012'
octal_max = '\377'
octal_two_digit = '\77'
octal_one_digit = '\7'

# multiple escapes in one value
multi_escape = 'line1\nline2\ttab\\backslash'

# UTF-8 content inside quotes
utf8_content = 'café résumé naïve'
utf8_emoji = '🌍🎉'
utf8_cjk = '你好世界'

# special chars that are delimiters outside quotes
comment_chars = '# not a comment ; also not'
bracket_chars = '[not a section]'
equals_in_value = 'key=value'
colon_in_value = 'key:value'

# value with only escapes
only_escapes = '\n\t\r'
