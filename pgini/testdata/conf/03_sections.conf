# section ::= '[' identifier ']' WSP* comment? EOL
# Tests section header variants.

# simple section
[basic]
key = one

# uppercase
[UPPER]
key = two

# mixed case (case-insensitive, so [Mixed] and [mixed] are same section)
[Mixed]
key = three

# underscore start
[_private]
key = four

# underscores and digits in body
[section_2_name]
key = five

# single letter
[x]
key = six

# trailing whitespace after ]
[trailing]
key = seven

# trailing comment after ]
[commented]  # this is a comment
key = eight

# trailing semicolon comment after ]
[semicommented] ; also a comment
key = nine

# whitespace inside brackets around name
[ padded ]
key = ten

# reopening a section appends to it
[basic]
key2 = eleven

# the default alias
[default]
default_key = twelve
