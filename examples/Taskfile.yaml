version: '3'

vars:
    SHELL_DIR: ../shell

tasks:
    default:
        desc: Run all examples
        cmds:
            - sh {{.SHELL_DIR}}/example.sh --all

    '01':
        desc: 'Run example: load struct'
        cmds:
            - sh {{.SHELL_DIR}}/example.sh 01

    '02':
        desc: 'Run example: parse and query'
        cmds:
            - sh {{.SHELL_DIR}}/example.sh 02

    '03':
        desc: 'Run example: marshal struct'
        cmds:
            - sh {{.SHELL_DIR}}/example.sh 03

    '04':
        desc: 'Run example: custom marshal'
        cmds:
            - sh {{.SHELL_DIR}}/example.sh 04
